<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Map — Metrou București</title>
    <meta name="description" content="Interactive map of Bucharest's metro network. All 5 lines — M1 through M5 — displayed on OpenStreetMap.">
    <meta name="theme-color" content="#0D0F1A">
    <link rel="canonical" href="https://www.metroubucuresti.ro/map.html">
    <link rel="icon" type="image/png" sizes="32x32" href="https://lxtech.ro/metroubucuresti/images/favicon-32x32.png">

    <style>
        :root {
            --ink: #0D0F1A; --ink-mid: #13152A; --ink-soft: #1C1F35;
            --teal: #4ECDC4;
            --white: #FFFFFF;
            --border: rgba(255,255,255,0.08);
            --m1: #CC3333; --m2: #3366CC; --m3: #DDAA00; --m4: #2E8B57; --m5: #FF9831;
            --serif: 'DM Serif Display', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-size: 16px; }
        body { font-family: var(--sans); color: rgba(255,255,255,0.72); overflow: hidden; background: var(--ink); }

        .line-strip {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 1000;
            background: linear-gradient(90deg, var(--m1) 0% 20%, var(--m3) 20% 40%, var(--m2) 40% 60%, var(--m4) 60% 80%, var(--m5) 80% 100%);
        }
        .nav {
            position: fixed; top: 3px; left: 0; width: 100%; z-index: 900;
            background: rgba(13,15,26,.95); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1280px; margin: 0 auto; padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between; gap: 24px;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
            font-family: var(--serif); font-size: 1.1rem; color: var(--white); white-space: nowrap;
        }
        .nav-brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px var(--teal); }
        .nav-links { display: flex; list-style: none; gap: 32px; }
        .nav-links a {
            font-size: .78rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
            color: rgba(255,255,255,.5); text-decoration: none; transition: color .2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--teal); }
        .nav-dl {
            text-decoration: none; background: var(--teal); color: var(--ink);
            font-weight: 700; font-size: .8rem; padding: 8px 20px; border-radius: 8px;
            transition: opacity .2s; white-space: nowrap;
        }
        .nav-dl:hover { opacity: .88; }

        .page { display: flex; flex-direction: column; height: 100vh; padding-top: 54px; }

        .legend-bar {
            padding: 8px 16px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,.015); flex-shrink: 0;
        }
        .legend-item {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 13px; border-radius: 999px;
            font-size: .72rem; font-weight: 600; letter-spacing: .03em;
            cursor: pointer; transition: all .2s; user-select: none;
        }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .legend-item.lp1 { background: rgba(204,51,51,.12);  color: #e07070; border: 1px solid rgba(204,51,51,.28); }
        .legend-item.lp2 { background: rgba(51,102,204,.12); color: #6699ee; border: 1px solid rgba(51,102,204,.28); }
        .legend-item.lp3 { background: rgba(221,170,0,.12);  color: #eedd44; border: 1px solid rgba(221,170,0,.28); }
        .legend-item.lp4 { background: rgba(46,139,87,.14);  color: #55cc88; border: 1px solid rgba(46,139,87,.3); }
        .legend-item.lp5 { background: rgba(255,152,49,.12); color: #ffbb66; border: 1px solid rgba(255,152,49,.28); }
        .legend-item.off { opacity: .28; }
        .legend-item:hover { transform: translateY(-1px); }
        .legend-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
        .legend-info { font-size: .68rem; color: rgba(255,255,255,.2); display: flex; align-items: center; gap: 6px; }
        .legend-info a { color: var(--teal); text-decoration: none; font-weight: 600; }

        /* ── Search ───────────────────────────────────────────────────────── */
        .search-wrap { position: relative; display: flex; align-items: center; margin-left: auto; flex-shrink: 0; }
        .search-input {
            background: var(--ink-soft); border: 1px solid var(--border);
            color: var(--white); font-family: var(--sans); font-size: .78rem;
            padding: 6px 32px 6px 12px; border-radius: 8px; outline: none;
            width: 210px; transition: border-color .2s, width .25s;
        }
        .search-input::placeholder { color: rgba(255,255,255,.28); }
        .search-input:focus { border-color: var(--teal); width: 252px; }
        .search-icon {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,.3); pointer-events: none; font-size: .9rem; line-height: 1;
        }
        .search-clear {
            position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,.4); cursor: pointer; font-size: .72rem;
            display: none; background: none; border: none; padding: 2px 4px; border-radius: 3px; transition: color .15s;
        }
        .search-clear:hover { color: var(--teal); }
        .search-dropdown {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--ink-mid); border: 1px solid var(--border);
            border-radius: 10px; min-width: 290px; max-height: 300px;
            overflow-y: auto; z-index: 200;
            box-shadow: 0 16px 40px rgba(0,0,0,.65);
            display: none;
        }
        .search-dropdown.open { display: block; }
        .search-result {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px; cursor: pointer; transition: background .12s;
            border-bottom: 1px solid rgba(255,255,255,.04);
        }
        .search-result:last-child { border-bottom: none; }
        .search-result:hover, .search-result.sel { background: rgba(78,205,196,.07); }
        .sr-dots { display: flex; gap: 3px; flex-shrink: 0; }
        .sr-dot { width: 7px; height: 7px; border-radius: 50%; }
        .sr-name { font-size: .82rem; font-weight: 500; color: var(--white); flex: 1; }
        .sr-name em { font-style: normal; color: var(--teal); }
        .sr-lines { font-size: .65rem; color: rgba(255,255,255,.32); flex-shrink: 0; }
        .search-empty { padding: 16px 14px; font-size: .78rem; color: rgba(255,255,255,.3); text-align: center; }
        .search-dropdown::-webkit-scrollbar { width: 4px; }
        .search-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }

        .map-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .map-wrap:active { cursor: grabbing; }
        .map-wrap canvas { display: block; }

        .tooltip {
            position: absolute; z-index: 50; pointer-events: none;
            background: var(--ink-mid); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.5);
            font-family: var(--sans); opacity: 0; transition: opacity .15s;
        }
        .tooltip.show { opacity: 1; }
        .tooltip-name { font-weight: 600; font-size: .88rem; color: var(--white); margin-bottom: 4px; }
        .tooltip-lines { display: flex; gap: 4px; flex-wrap: wrap; }
        .tooltip-line {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 4px;
        }
        .tooltip-line-dot { width: 5px; height: 5px; border-radius: 50%; }

        .map-footer {
            padding: 10px 40px; border-top: 1px solid var(--border);
            background: var(--ink); display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
        }
        .foot-brand-sm {
            font-family: var(--serif); font-size: .82rem; color: var(--white);
            display: flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .foot-dot-sm { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 4px var(--teal); }
        .map-footer-right { font-size: .68rem; color: rgba(255,255,255,.2); }
        .map-footer-right a { color: rgba(78,205,196,.5); text-decoration: none; }

        .map-controls { position: absolute; bottom: 20px; right: 20px; z-index: 40; display: flex; flex-direction: column; gap: 2px; }
        .map-ctrl-btn {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: rgba(13,15,26,.9); backdrop-filter: blur(8px);
            color: var(--white); font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; font-family: var(--sans); font-weight: 300;
        }
        .map-ctrl-btn:first-child { border-radius: 8px 8px 0 0; }
        .map-ctrl-btn:last-child  { border-radius: 0 0 8px 8px; }
        .map-ctrl-btn:hover { background: var(--ink-soft); color: var(--teal); }
        .map-ctrl-fit {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: rgba(13,15,26,.9); backdrop-filter: blur(8px); border-radius: 8px;
            color: var(--white); font-size: .85rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-top: 8px; transition: all .15s;
        }
        .map-ctrl-fit:hover { background: var(--ink-soft); color: var(--teal); }

        @media (max-width: 700px) {
            .nav-links { display: none !important; }
            .nav-inner { padding: 12px 20px; }
            .legend-bar { padding: 8px 12px; gap: 5px; }
            .legend-item { padding: 4px 9px; font-size: .65rem; }
            .legend-info, .legend-sep { display: none; }
            .map-footer { padding: 8px 16px; }
            .search-input { width: 135px; }
            .search-input:focus { width: 172px; }
            .search-dropdown { min-width: 225px; }
        }
    </style>
</head>

    {n:'Universitate',           lat:44.435563, lng:26.102468, lines:['M2']},

// =============================================================================
// MAP ENGINE
// =============================================================================
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('mapWrap');
const ttEl   = document.getElementById('tooltip');
const ttName = document.getElementById('ttName');
const ttLines= document.getElementById('ttLines');

let W=0, H=0;
let cLat=44.435, cLng=26.095, zoom=13;
const ZMIN=11, ZMAX=18;
let dragging=false, dsx,dsy,dsLat,dsLng;
let hovered=null, pinnedStation=null, pinAnim=0;
const vis={M1:true,M2:true,M3:true,M4:true,M5:true};
const tiles={};
const TS=256;

// Mercator helpers
function lng2x(lng,z){ return ((lng+180)/360)*(1<<z)*TS; }
function lat2y(lat,z){
    const r=lat*Math.PI/180;
    return ((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2)*(1<<z)*TS;
}
function geo2s(lat,lng){
    const z=Math.round(zoom);
    return [lng2x(lng,z)-lng2x(cLng,z)+W/2, lat2y(lat,z)-lat2y(cLat,z)+H/2];
}

// Tile cache
function tileUrl(tx,ty,tz){
    return 'https://'+['a','b','c'][(tx+ty)%3]+'.tile.openstreetmap.org/'+tz+'/'+tx+'/'+ty+'.png';
}
function loadTile(tx,ty,tz){
    const k=tz+'/'+tx+'/'+ty;
    if(tiles[k]) return tiles[k];
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{tiles[k].ok=true;render();};
    img.onerror=()=>{tiles[k].err=true;};
    img.src=tileUrl(tx,ty,tz);
    return (tiles[k]={img,ok:false,err:false});
}

// Draw one polyline segment: glow + solid pass
function polyline(pts, color, w){
    if(pts.length<2) return;
    ctx.beginPath();
    pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
    ctx.strokeStyle=color+'55'; ctx.lineWidth=w+7; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    ctx.beginPath();
    pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
    ctx.strokeStyle=color; ctx.lineWidth=w; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
}

// Draw one station dot + label
function drawStation(s, isH, isPin){
    const [x,y]=geo2s(s.lat,s.lng);
    const multi=s.lines.length>1;
    const r=multi?6:4.5;
    const rd=(isH||isPin)?r+2.5:r;

    // Animated pulse ring when pin-selected
    if(isPin && pinAnim>0){
        const prog=pinAnim/60;
        const rp=(1-prog)*24+rd+4;
        ctx.beginPath(); ctx.arc(x,y,rp,0,Math.PI*2);
        ctx.strokeStyle='rgba(78,205,196,'+(prog*.85)+')';
        ctx.lineWidth=2.5; ctx.stroke();
        pinAnim--;
        if(pinAnim>0) requestAnimationFrame(render);
    }

    // Dark outer ring
    ctx.beginPath(); ctx.arc(x,y,rd+2,0,Math.PI*2);
    ctx.fillStyle='#0D0F1A'; ctx.fill();

    // Soft halo
    if(isH||isPin||multi){
        ctx.beginPath(); ctx.arc(x,y,rd+9,0,Math.PI*2);
        ctx.fillStyle=isPin?'rgba(78,205,196,.20)':multi?'rgba(255,255,255,.09)':COLORS[s.lines[0]]+'20';
        ctx.fill();
    }

    // Dot fill
    ctx.beginPath(); ctx.arc(x,y,rd,0,Math.PI*2);
    ctx.fillStyle=isPin?'#4ECDC4':multi?'#FFFFFF':COLORS[s.lines[0]]; ctx.fill();

    // Label pill
    const fs=(isH||isPin)?12:10;
    ctx.font=((isH||isPin)?'600 ':'500 ')+fs+'px "DM Sans",sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    const m=ctx.measureText(s.n);
    const lx=x+rd+7, ly=y, p=3;
    const bx=lx-p, by=ly-fs/2-p, bw=m.width+p*2, bh=fs+p*2, br=4;
    ctx.fillStyle='rgba(10,12,28,0.82)';
    ctx.beginPath();
    ctx.moveTo(bx+br,by); ctx.lineTo(bx+bw-br,by);
    ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
    ctx.lineTo(bx+bw,by+bh-br);
    ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
    ctx.lineTo(bx+br,by+bh);
    ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
    ctx.lineTo(bx,by+br);
    ctx.quadraticCurveTo(bx,by,bx+br,by);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=(isH||isPin)?'#FFFFFF':'rgba(255,255,255,0.80)';
    ctx.fillText(s.n,lx,ly);
}

// Main render loop
function render(){
    W=wrap.clientWidth; H=wrap.clientHeight;
    const dpr=devicePixelRatio||1;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);

    ctx.fillStyle='#2a2d3e'; ctx.fillRect(0,0,W,H);

    // OSM tiles
    const z=Math.round(zoom);
    const cx=lng2x(cLng,z), cy=lat2y(cLat,z);
    const ox=W/2-cx, oy=H/2-cy;
    const txMin=Math.floor((cx-W/2)/TS), txMax=Math.floor((cx+W/2)/TS);
    const tyMin=Math.floor((cy-H/2)/TS), tyMax=Math.floor((cy+H/2)/TS);
    for(let tx=txMin;tx<=txMax;tx++)
        for(let ty=tyMin;ty<=tyMax;ty++){
            const t=loadTile(tx,ty,z);
            if(t.ok) ctx.drawImage(t.img,tx*TS+ox,ty*TS+oy,TS,TS);
        }

    // Dark wash
    ctx.fillStyle='rgba(10,12,28,0.52)'; ctx.fillRect(0,0,W,H);

    // Transfer connectors (dashed grey)
    ctx.save();
    ctx.setLineDash([5,5]);
    for(const seg of TRANSFER_SEGS){
        const pts=seg.map(c=>geo2s(c[0],c[1]));
        ctx.beginPath();
        pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
        ctx.strokeStyle='rgba(200,210,230,0.30)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();

    // Metro lines (each segment)
    for(const [ln,segs] of Object.entries(LINE_SEGMENTS)){
        if(!vis[ln]) continue;
        for(const seg of segs)
            polyline(seg.map(c=>geo2s(c[0],c[1])), COLORS[ln], 4);
    }

    // Stations
    for(const s of STATIONS){
        if(!s.lines.some(l=>vis[l])) continue;
        drawStation(s, hovered&&hovered.n===s.n, pinnedStation&&pinnedStation.n===s.n);
    }
}

// =============================================================================
// SEARCH
// =============================================================================
const searchInput    = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchClear    = document.getElementById('searchClear');
const searchIcon     = document.getElementById('searchIcon');
let results=[], selIdx=-1;

function fold(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }

function highlight(text,q){
    const fi=fold(text), fq=fold(q);
    const i=fi.indexOf(fq);
    if(i<0) return text;
    return text.slice(0,i)+'<em>'+text.slice(i,i+q.length)+'</em>'+text.slice(i+q.length);
}

function doSearch(q){
    if(!q.trim()){closeDropdown();return;}
    const fq=fold(q.trim());
    results=STATIONS.filter(s=>fold(s.n).includes(fq));
    selIdx=results.length?0:-1;
    renderDrop(q.trim());
}

function renderDrop(q){
    searchDropdown.innerHTML='';
    if(!results.length){
        searchDropdown.innerHTML='<div class="search-empty">No stations found</div>';
        searchDropdown.classList.add('open'); return;
    }
    results.forEach((s,i)=>{
        const div=document.createElement('div');
        div.className='search-result'+(i===selIdx?' sel':'');
        const dots=s.lines.map(l=>'<span class="sr-dot" style="background:'+COLORS[l]+'"></span>').join('');
        div.innerHTML='<span class="sr-dots">'+dots+'</span>'+
            '<span class="sr-name">'+highlight(s.n,q)+'</span>'+
            '<span class="sr-lines">'+s.lines.join(' · ')+'</span>';
        div.addEventListener('mousedown',e=>{e.preventDefault();pickStation(i);});
        searchDropdown.appendChild(div);
    });
    searchDropdown.classList.add('open');
}

function pickStation(idx){
    if(idx<0||idx>=results.length) return;
    const s=results[idx];
    pinnedStation=s; cLat=s.lat; cLng=s.lng;
    zoom=Math.min(ZMAX,Math.max(zoom,15.5));
    pinAnim=60; render();
    closeDropdown();
    searchInput.value=s.n;
    searchInput.blur();
}

function closeDropdown(){
    searchDropdown.classList.remove('open');
    searchDropdown.innerHTML='';
    results=[]; selIdx=-1;
}

function updateSel(){
    searchDropdown.querySelectorAll('.search-result').forEach((el,i)=>el.classList.toggle('sel',i===selIdx));
    searchDropdown.querySelectorAll('.search-result')[selIdx]?.scrollIntoView({block:'nearest'});
}

searchInput.addEventListener('input',e=>{
    const v=e.target.value;
    searchClear.style.display=v?'block':'none';
    searchIcon.style.display=v?'none':'block';
    if(!v){pinnedStation=null;render();closeDropdown();return;}
    doSearch(v);
});
searchInput.addEventListener('keydown',e=>{
    if(!searchDropdown.classList.contains('open')) return;
    if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,results.length-1);updateSel();}
    else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(0,selIdx-1);updateSel();}
    else if(e.key==='Enter'){e.preventDefault();if(selIdx>=0)pickStation(selIdx);}
    else if(e.key==='Escape'){closeDropdown();searchInput.blur();}
});
searchClear.addEventListener('click',()=>{
    searchInput.value='';
    searchClear.style.display='none'; searchIcon.style.display='block';
    pinnedStation=null; closeDropdown(); render(); searchInput.focus();
});
document.addEventListener('mousedown',e=>{
    if(!document.getElementById('searchWrap').contains(e.target)) closeDropdown();
});

// =============================================================================
// INTERACTIONS
// =============================================================================
window.addEventListener('resize',render);

// Mouse drag
wrap.addEventListener('mousedown',e=>{dragging=true;dsx=e.clientX;dsy=e.clientY;dsLat=cLat;dsLng=cLng;});
window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const sc=(1<<Math.round(zoom))*TS;
    cLng=dsLng-(e.clientX-dsx)/sc*360;
    cLat=dsLat+(e.clientY-dsy)/sc*360*Math.cos(dsLat*Math.PI/180);
    render();
});
window.addEventListener('mouseup',()=>{dragging=false;});

// Touch drag
let tsx,tsy,tsLat,tsLng;
wrap.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;tsLat=cLat;tsLng=cLng;
},{passive:true});
wrap.addEventListener('touchmove',e=>{
    if(e.touches.length!==1)return;
    const sc=(1<<Math.round(zoom))*TS;
    cLng=tsLng-(e.touches[0].clientX-tsx)/sc*360;
    cLat=tsLat+(e.touches[0].clientY-tsy)/sc*360*Math.cos(tsLat*Math.PI/180);
    render();
},{passive:true});

// Scroll zoom
wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    zoom=Math.max(ZMIN,Math.min(ZMAX,zoom+(e.deltaY>0?-.4:.4)));
    render();
},{passive:false});

window.zoomMap=function(d){zoom=Math.max(ZMIN,Math.min(ZMAX,zoom+d*.6));render();};

// Hover & tooltip
function nearest(mx,my){
    let best=null,bd=Infinity;
    for(const s of STATIONS){
        if(!s.lines.some(l=>vis[l])) continue;
        const [sx,sy]=geo2s(s.lat,s.lng);
        const d=Math.hypot(mx-sx,my-sy);
        if(d<22&&d<bd){bd=d;best=s;}
    }
    return best;
}
wrap.addEventListener('mousemove',e=>{
    if(dragging){ttEl.classList.remove('show');return;}
    const r=wrap.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const s=nearest(mx,my);
    if(s){
        hovered=s;
        ttName.textContent=s.n;
        ttLines.innerHTML=s.lines.map(ln=>
            '<span class="tooltip-line" style="background:'+COLORS[ln]+'22;color:'+COLORS[ln]+';border:1px solid '+COLORS[ln]+'55">'+
            '<span class="tooltip-line-dot" style="background:'+COLORS[ln]+'"></span>'+ln+'</span>'
        ).join('');
        let tx=mx+16,ty=my-20;
        if(tx+180>W) tx=mx-188; if(ty<8) ty=my+22;
        ttEl.style.left=tx+'px'; ttEl.style.top=ty+'px';
        ttEl.classList.add('show');
        wrap.style.cursor='pointer';
    } else {
        if(hovered) hovered=null;
        ttEl.classList.remove('show');
        wrap.style.cursor='grab';
    }
    render();
});
wrap.addEventListener('mouseleave',()=>{
    ttEl.classList.remove('show');
    if(hovered){hovered=null;render();}
});

// Line toggle
window.toggleLine=function(name,el){
    vis[name]=!vis[name];
    el.classList.toggle('off',!vis[name]);
    render();
};

// Fit-all
window.fitAll=function(){
    let a=90,b=-90,c=180,d=-180;
    for(const s of STATIONS){
        if(!s.lines.some(l=>vis[l])) continue;
        a=Math.min(a,s.lat);b=Math.max(b,s.lat);
        c=Math.min(c,s.lng);d=Math.max(d,s.lng);
    }
    if(a>b) return;
    cLat=(a+b)/2; cLng=(c+d)/2;
    const zLat=Math.log2(360/(b-a)*H/TS)-1;
    const zLng=Math.log2(360/(d-c)*W/TS)-1;
    zoom=Math.max(ZMIN,Math.min(ZMAX,Math.min(zLat,zLng)-.3));
    render();
};

setTimeout(fitAll,80);
})();
</script>
