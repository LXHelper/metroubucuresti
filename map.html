<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Map — Metrou București</title>
    <meta name="description" content="Interactive map of Bucharest's metro network. All 5 lines — M1 through M5 — displayed on OpenStreetMap.">
    <meta name="theme-color" content="#0D0F1A">
    <link rel="canonical" href="https://www.metroubucuresti.ro/map.html">
    <link rel="icon" type="image/png" sizes="32x32" href="https://lxtech.ro/metroubucuresti/images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0D0F1A; --ink-mid: #13152A; --ink-soft: #1C1F35;
            --teal: #4ECDC4; --teal-dim: #2A9D96;
            --white: #FFFFFF;
            --mist: rgba(255,255,255,0.07); --border: rgba(255,255,255,0.08);
            --m1: #FFD700; --m2: #4A90D9; --m3: #E53935; --m4: #43A047; --m5: #FB8C00;
            --serif: 'DM Serif Display', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-size: 16px; }
        body {
            font-family: var(--sans); color: rgba(255,255,255,0.72);
            overflow: hidden; background: var(--ink);
        }

        .line-strip {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 1000;
            background: linear-gradient(90deg, var(--m1) 0% 20%, var(--m3) 20% 40%, var(--m2) 40% 60%, var(--m4) 60% 80%, var(--m5) 80% 100%);
        }

        .nav {
            position: fixed; top: 3px; left: 0; width: 100%; z-index: 900;
            background: rgba(13,15,26,.95); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1280px; margin: 0 auto; padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between; gap: 24px;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
            font-family: var(--serif); font-size: 1.1rem; color: var(--white); white-space: nowrap;
        }
        .nav-brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px var(--teal); }
        .nav-links { display: flex; list-style: none; gap: 32px; }
        .nav-links a {
            font-size: .78rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
            color: rgba(255,255,255,.5); text-decoration: none; transition: color .2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--teal); }
        .nav-dl {
            text-decoration: none; background: var(--teal); color: var(--ink);
            font-weight: 700; font-size: .8rem; padding: 8px 20px; border-radius: 8px;
            transition: opacity .2s; white-space: nowrap;
        }
        .nav-dl:hover { opacity: .88; }

        .page { display: flex; flex-direction: column; height: 100vh; padding-top: 54px; }

        .legend-bar {
            padding: 8px 16px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,.015); flex-shrink: 0;
        }
        .legend-item {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 13px; border-radius: 999px;
            font-size: .72rem; font-weight: 600; letter-spacing: .03em;
            cursor: pointer; transition: all .2s; user-select: none;
        }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .legend-item.lp1 { background: rgba(255,215,0,.1); color: #FFD700; border: 1px solid rgba(255,215,0,.2); }
        .legend-item.lp2 { background: rgba(74,144,217,.1); color: #6aaee8; border: 1px solid rgba(74,144,217,.2); }
        .legend-item.lp3 { background: rgba(229,57,53,.1); color: #ef6c69; border: 1px solid rgba(229,57,53,.2); }
        .legend-item.lp4 { background: rgba(67,160,71,.1); color: #66bb6a; border: 1px solid rgba(67,160,71,.2); }
        .legend-item.lp5 { background: rgba(251,140,0,.1); color: #FFA726; border: 1px solid rgba(251,140,0,.2); }
        .legend-item.off { opacity: .3; }
        .legend-item:hover { transform: translateY(-1px); }
        .legend-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

        /* ── Search ─────────────────────────────────────────────────────────── */
        .search-wrap {
            position: relative; display: flex; align-items: center; margin-left: auto;
        }
        .search-input {
            background: var(--ink-soft); border: 1px solid var(--border);
            color: var(--white); font-family: var(--sans); font-size: .78rem;
            padding: 6px 34px 6px 12px; border-radius: 8px; outline: none;
            width: 220px; transition: border-color .2s, width .25s;
        }
        .search-input::placeholder { color: rgba(255,255,255,.28); }
        .search-input:focus { border-color: var(--teal); width: 260px; }
        .search-icon {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,.3); pointer-events: none; font-size: .85rem;
        }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,.4); cursor: pointer; font-size: .78rem;
            display: none; background: none; border: none; padding: 2px 4px;
            border-radius: 3px; transition: color .15s;
        }
        .search-clear:hover { color: var(--teal); }
        .search-dropdown {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--ink-mid); border: 1px solid var(--border);
            border-radius: 10px; min-width: 280px; max-height: 280px;
            overflow-y: auto; z-index: 200;
            box-shadow: 0 16px 40px rgba(0,0,0,.6);
            display: none;
        }
        .search-dropdown.open { display: block; }
        .search-result {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer; transition: background .15s;
            border-bottom: 1px solid rgba(255,255,255,.04);
        }
        .search-result:last-child { border-bottom: none; }
        .search-result:hover, .search-result.selected { background: rgba(78,205,196,.07); }
        .sr-dots { display: flex; gap: 3px; flex-shrink: 0; }
        .sr-dot { width: 7px; height: 7px; border-radius: 50%; }
        .sr-name { font-size: .82rem; font-weight: 500; color: var(--white); flex: 1; }
        .sr-name em { font-style: normal; color: var(--teal); }
        .sr-lines { font-size: .65rem; color: rgba(255,255,255,.35); }
        .search-empty { padding: 18px 14px; font-size: .78rem; color: rgba(255,255,255,.3); text-align: center; }

        .legend-info { font-size: .68rem; color: rgba(255,255,255,.2); display: flex; align-items: center; gap: 6px; }
        .legend-info a { color: var(--teal); text-decoration: none; font-weight: 600; }

        .map-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .map-wrap:active { cursor: grabbing; }
        .map-wrap canvas { display: block; }

        .tooltip {
            position: absolute; z-index: 50; pointer-events: none;
            background: var(--ink-mid); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.5);
            font-family: var(--sans); opacity: 0; transition: opacity .15s;
        }
        .tooltip.show { opacity: 1; }
        .tooltip-name { font-weight: 600; font-size: .88rem; color: var(--white); margin-bottom: 4px; }
        .tooltip-lines { display: flex; gap: 4px; flex-wrap: wrap; }
        .tooltip-line {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 4px;
        }
        .tooltip-line-dot { width: 5px; height: 5px; border-radius: 50%; }

        /* search pin pulse */
        @keyframes pinPulse {
            0%   { box-shadow: 0 0 0 0 rgba(78,205,196,.7); }
            70%  { box-shadow: 0 0 0 14px rgba(78,205,196,0); }
            100% { box-shadow: 0 0 0 0 rgba(78,205,196,0); }
        }

        .map-footer {
            padding: 10px 40px; border-top: 1px solid var(--border);
            background: var(--ink); display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
        }
        .foot-brand-sm {
            font-family: var(--serif); font-size: .82rem; color: var(--white);
            display: flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .foot-dot-sm { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 4px var(--teal); }
        .map-footer-right { font-size: .68rem; color: rgba(255,255,255,.2); }
        .map-footer-right a { color: rgba(78,205,196,.5); text-decoration: none; }

        .map-controls { position: absolute; bottom: 20px; right: 20px; z-index: 40; display: flex; flex-direction: column; gap: 2px; }
        .map-ctrl-btn {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: rgba(13,15,26,.9); backdrop-filter: blur(8px);
            color: var(--white); font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; font-family: var(--sans); font-weight: 300;
        }
        .map-ctrl-btn:first-child { border-radius: 8px 8px 0 0; }
        .map-ctrl-btn:last-child { border-radius: 0 0 8px 8px; }
        .map-ctrl-btn:hover { background: var(--ink-soft); color: var(--teal); }
        .map-ctrl-fit {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: rgba(13,15,26,.9); backdrop-filter: blur(8px); border-radius: 8px;
            color: var(--white); font-size: .85rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-top: 8px; transition: all .15s;
        }
        .map-ctrl-fit:hover { background: var(--ink-soft); color: var(--teal); }

        /* Scrollbar for dropdown */
        .search-dropdown::-webkit-scrollbar { width: 4px; }
        .search-dropdown::-webkit-scrollbar-track { background: transparent; }
        .search-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }

        @media (max-width: 700px) {
            .nav-links { display: none !important; }
            .nav-inner { padding: 12px 20px; }
            .legend-bar { padding: 8px 14px; gap: 5px; }
            .legend-item { padding: 4px 9px; font-size: .65rem; }
            .legend-info, .legend-sep { display: none; }
            .map-footer { padding: 8px 16px; }
            .search-input { width: 150px; }
            .search-input:focus { width: 180px; }
            .search-dropdown { min-width: 220px; right: 0; }
        }
    </style>
</head>
<body>
    <div class="line-strip"></div>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand"><div class="nav-brand-dot"></div>Metrou București</a>
            <ul class="nav-links">
                <li><a href="index.html#features">Features</a></li>
                <li><a href="map.html" class="active">Metro Map</a></li>
                <li><a href="index.html#screenshots">Screenshots</a></li>
                <li><a href="index.html#download">Download</a></li>
                <li><a href="feedback.html">Contact</a></li>
            </ul>
            <a href="index.html#download" class="nav-dl">Free — Get the App</a>
        </div>
    </nav>

    <div class="page">
        <div class="legend-bar">
            <div class="legend-item lp1" data-line="M1" onclick="toggleLine('M1',this)"><div class="legend-dot" style="background:var(--m1)"></div>M1</div>
            <div class="legend-item lp2" data-line="M2" onclick="toggleLine('M2',this)"><div class="legend-dot" style="background:var(--m2)"></div>M2</div>
            <div class="legend-item lp3" data-line="M3" onclick="toggleLine('M3',this)"><div class="legend-dot" style="background:var(--m3)"></div>M3</div>
            <div class="legend-item lp4" data-line="M4" onclick="toggleLine('M4',this)"><div class="legend-dot" style="background:var(--m4)"></div>M4</div>
            <div class="legend-item lp5" data-line="M5" onclick="toggleLine('M5',this)"><div class="legend-dot" style="background:var(--m5)"></div>M5</div>
            <div class="legend-sep"></div>
            <div class="legend-info">
                <span>Scroll to zoom · Drag to pan · Hover for info</span>
                <span>·</span>
                <a href="index.html#download">Get the full app →</a>
            </div>

            <!-- Search -->
            <div class="search-wrap" id="searchWrap">
                <input type="text" class="search-input" id="searchInput" placeholder="Search station…" autocomplete="off" autocorrect="off" spellcheck="false">
                <span class="search-icon" id="searchIcon">⌕</span>
                <button class="search-clear" id="searchClear" title="Clear search">✕</button>
                <div class="search-dropdown" id="searchDropdown"></div>
            </div>
        </div>

        <div class="map-wrap" id="mapWrap">
            <canvas id="mapCanvas"></canvas>
            <div class="tooltip" id="tooltip">
                <div class="tooltip-name" id="ttName"></div>
                <div class="tooltip-lines" id="ttLines"></div>
            </div>
            <div class="map-controls">
                <button class="map-ctrl-btn" onclick="zoomMap(1)">+</button>
                <button class="map-ctrl-btn" onclick="zoomMap(-1)">−</button>
                <button class="map-ctrl-fit" onclick="fitAll()" title="Fit all lines">⊡</button>
            </div>
        </div>

        <div class="map-footer">
            <a href="index.html" class="foot-brand-sm"><span class="foot-dot-sm"></span>Metrou București — Interactive Metro Map</a>
            <div class="map-footer-right">
                © 2024–2026 Metrou București · Map © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
            </div>
        </div>
    </div>

<script>
(function() {
    "use strict";

    // ==========================================
    // DATA  — verified GPS coordinates
    // Source: OpenStreetMap / Metrorex official
    // ==========================================
    const COLORS = { M1:'#FFD700', M2:'#4A90D9', M3:'#E53935', M4:'#43A047', M5:'#FB8C00' };

    // ── M1 ─────────────────────────────────────────────────────────────────
    // Pantelimon ↔ Dristor 1 (loop line)
    // Order follows the physical track: eastern terminus → south-west arc →
    // north arc → back south-east to close the loop.
    const LINES = {
        M1: [
            {n:'Pantelimon',          lat:44.4285, lng:26.1524},
            {n:'Republica',           lat:44.4268, lng:26.1362},
            {n:'Costin Georgian',     lat:44.4267, lng:26.1276},
            {n:'Titan',               lat:44.4238, lng:26.1203},
            {n:'Nicolae Grigorescu',  lat:44.4185, lng:26.1133},
            {n:'Piața Muncii',        lat:44.4148, lng:26.1080},
            {n:'Piața Iancului',      lat:44.4188, lng:26.1291},
            // corrected: Dristor 1 is south of P. Iancului, closes loop to Dristor 2
            {n:'Dristor 1',           lat:44.4088, lng:26.1171},
            {n:'Mihai Bravu',         lat:44.4028, lng:26.1060},
            {n:'Timpuri Noi',         lat:44.4063, lng:26.0918},
            {n:'Piața Unirii 1',      lat:44.4275, lng:26.1013},
            {n:'Izvor',               lat:44.4319, lng:26.0903},
            {n:'Eroilor 1',           lat:44.4358, lng:26.0784},
            {n:'Grozăvești',          lat:44.4438, lng:26.0619},
            {n:'Petrache Poenaru',    lat:44.4464, lng:26.0504},
            {n:'Crângași',            lat:44.4488, lng:26.0424},
            {n:'Basarab 1',           lat:44.4491, lng:26.0556},
            {n:'Gara de Nord 1',      lat:44.4453, lng:26.0685},
            {n:'Piața Victoriei 1',   lat:44.4527, lng:26.0853},
            {n:'Ștefan cel Mare',     lat:44.4560, lng:26.1003},
            {n:'Obor',                lat:44.4523, lng:26.1162},
            // loop closes: Obor → Piața Iancului → Piața Muncii → Dristor 2
            {n:'Dristor 2',           lat:44.4108, lng:26.1240}
        ],
        M2: [
            {n:'Berceni',                  lat:44.3816, lng:26.1256},
            {n:'Apărătorii Patriei',       lat:44.3912, lng:26.1215},
            {n:'Piața Sudului',            lat:44.3993, lng:26.1174},
            {n:'Constantin Brâncoveanu',   lat:44.4046, lng:26.1128},
            {n:'Tineretului',              lat:44.4099, lng:26.1041},
            {n:'Piața Unirii 2',           lat:44.4275, lng:26.1013},
            {n:'Universitate',             lat:44.4352, lng:26.1028},
            {n:'Piața Română',             lat:44.4413, lng:26.0967},
            {n:'Piața Victoriei 2',        lat:44.4527, lng:26.0853},
            {n:'Aviatorilor',              lat:44.4615, lng:26.0828},
            {n:'Aurel Vlaicu',             lat:44.4699, lng:26.0893},
            {n:'Pipera',                   lat:44.4832, lng:26.0970},
            // extended to Tudor Arghezi (official M2 terminus)
            {n:'Tudor Arghezi',            lat:44.3780, lng:26.1240}
        ],
        M3: [
            // M3 western section: Anghel Saligny → Preciziei
            // Shares track with M1 between Dristor 1 – Eroilor 1
            {n:'Anghel Saligny',      lat:44.3998, lng:26.1322},
            {n:'Dristor 1',           lat:44.4088, lng:26.1171},
            {n:'Mihai Bravu',         lat:44.4028, lng:26.1060},
            {n:'Timpuri Noi',         lat:44.4063, lng:26.0918},
            {n:'Piața Unirii 1',      lat:44.4275, lng:26.1013},
            {n:'Izvor',               lat:44.4319, lng:26.0903},
            {n:'Eroilor 1',           lat:44.4358, lng:26.0784},
            {n:'Politehnica',         lat:44.4406, lng:26.0553},
            {n:'Lujerului',           lat:44.4363, lng:26.0373},
            {n:'Gorjului',            lat:44.4296, lng:26.0238},
            {n:'Păcii',               lat:44.4310, lng:26.0104},
            {n:'Preciziei',           lat:44.4328, lng:25.9961}
        ],
        M4: [
            {n:'Gara de Nord 2',  lat:44.4453, lng:26.0685},
            {n:'1 Mai',           lat:44.4567, lng:26.0707},
            {n:'Jiului',          lat:44.4636, lng:26.0682},
            {n:'Parc Bazilescu',  lat:44.4718, lng:26.0658},
            {n:'Laminorului',     lat:44.4793, lng:26.0640},
            {n:'Străulești',      lat:44.4887, lng:26.0621}
        ],
        M5: [
            // M5: Eroilor 2 → Drumul Taberei (2 termini after Romancierilor branch)
            // Western branch: Romancierilor → Râul Doamnei
            // Southern branch: Romancierilor → Valea Cascadelor
            {n:'Eroilor 2',           lat:44.4358, lng:26.0784},
            {n:'Academia Militară',   lat:44.4282, lng:26.0689},
            {n:'Cotroceni',           lat:44.4361, lng:26.0572},
            {n:'Hașdeu',              lat:44.4233, lng:26.0614},
            {n:'Favorit',             lat:44.4180, lng:26.0560},
            {n:'Orizont',             lat:44.4123, lng:26.0510},
            {n:'Romancierilor',       lat:44.4270, lng:26.0410},
            // Branch 1 → Valea Cascadelor (south)
            {n:'Valea Cascadelor',    lat:44.4173, lng:26.0322},
            // Branch 2 → Râul Doamnei (west)
            {n:'Râul Doamnei',        lat:44.4238, lng:26.0274}
        ]
    };

    // ── M5 branch geometry — drawn as two separate paths from Romancierilor ──
    // Defined as coordinate pairs to allow proper branch rendering
    const M5_BRANCHES = {
        main: [
            // Eroilor 2 → Romancierilor (shared trunk)
            {n:'Eroilor 2',         lat:44.4358, lng:26.0784},
            {n:'Academia Militară', lat:44.4282, lng:26.0689},
            {n:'Cotroceni',         lat:44.4361, lng:26.0572},
            {n:'Hașdeu',            lat:44.4233, lng:26.0614},
            {n:'Favorit',           lat:44.4180, lng:26.0560},
            {n:'Orizont',           lat:44.4123, lng:26.0510},
            {n:'Romancierilor',     lat:44.4270, lng:26.0410}
        ],
        branchValeaCascadelor: [
            {n:'Romancierilor',     lat:44.4270, lng:26.0410},
            {n:'Valea Cascadelor',  lat:44.4173, lng:26.0322}
        ],
        branchRaulDoamnei: [
            {n:'Romancierilor',     lat:44.4270, lng:26.0410},
            {n:'Râul Doamnei',      lat:44.4238, lng:26.0274}
        ]
    };

    // Transfer detection — strips trailing digits (e.g. "Eroilor 1" → "Eroilor")
    function norm(name) { return name.replace(/\s*\d+$/, '').replace(/\s*\(.*\)/, '').trim(); }
    function getLines(name) {
        const k = norm(name);
        const res = new Set();
        for (const [ln, sts] of Object.entries(LINES)) {
            for (const s of sts) { if (norm(s.n) === k) res.add(ln); }
        }
        return [...res];
    }

    // Flat deduplicated station list for search
    function allStations() {
        const map = new Map();
        for (const [ln, sts] of Object.entries(LINES)) {
            for (const s of sts) {
                const k = s.n;
                if (!map.has(k)) map.set(k, { ...s, lines: [] });
                const entry = map.get(k);
                if (!entry.lines.includes(ln)) entry.lines.push(ln);
            }
        }
        return [...map.values()].sort((a, b) => a.n.localeCompare(b.n, 'ro'));
    }
    const ALL_STATIONS = allStations();

    // ==========================================
    // MAP ENGINE
    // ==========================================
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('mapWrap');
    const ttEl = document.getElementById('tooltip');
    const ttName = document.getElementById('ttName');
    const ttLines = document.getElementById('ttLines');

    let W = 0, H = 0;
    let cLat = 44.435, cLng = 26.075, zoom = 14;
    const ZMIN = 11, ZMAX = 18;
    let dragging = false, dsx, dsy, dsLat, dsLng;
    let hovered = null;
    let pinnedStation = null; // highlighted from search
    let pinPulse = 0;         // animation counter for pin ring
    const vis = { M1:true, M2:true, M3:true, M4:true, M5:true };
    const tiles = {};
    const TS = 256;

    // Projection
    function lng2x(lng, z) { return ((lng+180)/360) * (1<<z) * TS; }
    function lat2y(lat, z) {
        const r = lat * Math.PI/180;
        return ((1 - Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2) * (1<<z) * TS;
    }

    function geo2s(lat, lng) {
        const z = Math.round(zoom);
        return [lng2x(lng,z)-lng2x(cLng,z)+W/2, lat2y(lat,z)-lat2y(cLat,z)+H/2];
    }

    // Tiles
    function tileUrl(x,y,z) {
        const s = ['a','b','c'][(x+y)%3];
        return 'https://'+s+'.tile.openstreetmap.org/'+z+'/'+x+'/'+y+'.png';
    }
    function loadTile(tx,ty,tz) {
        const k = tz+'/'+tx+'/'+ty;
        if (tiles[k]) return tiles[k];
        const img = new Image(); img.crossOrigin='anonymous';
        img.onload = () => { tiles[k].ok=true; render(); };
        img.onerror = () => { tiles[k].err=true; };
        img.src = tileUrl(tx,ty,tz);
        tiles[k] = {img, ok:false, err:false};
        return tiles[k];
    }

    // ==========================================
    // RENDER
    // ==========================================
    function render() {
        W = wrap.clientWidth; H = wrap.clientHeight;
        const dpr = devicePixelRatio||1;
        canvas.width = W*dpr; canvas.height = H*dpr;
        canvas.style.width = W+'px'; canvas.style.height = H+'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);

        ctx.fillStyle = '#2a2d3e'; ctx.fillRect(0,0,W,H);

        // OSM tiles
        const z = Math.round(zoom);
        const cx = lng2x(cLng,z), cy = lat2y(cLat,z);
        const ox = W/2 - cx, oy = H/2 - cy;
        const txMin = Math.floor((cx-W/2)/TS), txMax = Math.floor((cx+W/2)/TS);
        const tyMin = Math.floor((cy-H/2)/TS), tyMax = Math.floor((cy+H/2)/TS);
        for (let tx=txMin; tx<=txMax; tx++) {
            for (let ty=tyMin; ty<=tyMax; ty++) {
                const t = loadTile(tx,ty,z);
                if (t.ok) ctx.drawImage(t.img, tx*TS+ox, ty*TS+oy, TS, TS);
            }
        }

        // Dark overlay
        ctx.fillStyle = 'rgba(10,12,28,0.52)';
        ctx.fillRect(0,0,W,H);

        // Metro lines
        for (const [ln, sts] of Object.entries(LINES)) {
            if (!vis[ln]) continue;
            if (ln === 'M5') continue; // M5 drawn with branches below
            const c = COLORS[ln];
            const pts = sts.map(s => geo2s(s.lat, s.lng));
            drawLine(pts, c);
        }

        // M5 branches
        if (vis['M5']) {
            const c = COLORS['M5'];
            drawLine(M5_BRANCHES.main.map(s => geo2s(s.lat, s.lng)), c);
            drawLine(M5_BRANCHES.branchValeaCascadelor.map(s => geo2s(s.lat, s.lng)), c);
            drawLine(M5_BRANCHES.branchRaulDoamnei.map(s => geo2s(s.lat, s.lng)), c);
        }

        // Stations (deduplicated)
        const drawn = new Map();
        for (const [ln, sts] of Object.entries(LINES)) {
            if (!vis[ln]) continue;
            for (const s of sts) {
                const k = norm(s.n);
                if (!drawn.has(k)) drawn.set(k, { ...s, lines: getLines(s.n) });
            }
        }

        drawn.forEach(s => {
            const [x,y] = geo2s(s.lat, s.lng);
            const transfer = s.lines.length > 1;
            const isH = hovered && norm(hovered.n) === norm(s.n);
            const isPin = pinnedStation && norm(pinnedStation.n) === norm(s.n);
            const r = transfer ? 6 : 4.5;
            const rd = (isH || isPin) ? r+2 : r;

            // Pin pulse ring
            if (isPin && pinPulse > 0) {
                const alpha = pinPulse / 60;
                const rp = (60 - pinPulse) / 60 * 22 + rd + 2;
                ctx.beginPath(); ctx.arc(x,y,rp,0,Math.PI*2);
                ctx.strokeStyle = 'rgba(78,205,196,' + (alpha * .8) + ')';
                ctx.lineWidth = 2; ctx.stroke();
                pinPulse--;
                if (pinPulse > 0) requestAnimationFrame(render);
            }

            // Outer ring
            ctx.beginPath(); ctx.arc(x,y,rd+2,0,Math.PI*2);
            ctx.fillStyle='#0D0F1A'; ctx.fill();

            // Glow ring
            if (isH || isPin || transfer) {
                ctx.beginPath(); ctx.arc(x,y,rd+7,0,Math.PI*2);
                ctx.fillStyle = isPin ? 'rgba(78,205,196,0.25)'
                    : transfer ? 'rgba(255,255,255,0.12)' : COLORS[s.lines[0]]+'25';
                ctx.fill();
            }

            // Dot fill
            ctx.beginPath(); ctx.arc(x,y,rd,0,Math.PI*2);
            ctx.fillStyle = isPin ? '#4ECDC4' : transfer ? '#FFFFFF' : COLORS[s.lines[0]]; ctx.fill();

            // Station label
            const fs = (isH || isPin) ? 12 : 10;
            ctx.font = ((isH || isPin) ? '600 ' : '500 ') + fs + 'px "DM Sans",sans-serif';
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            const txt = s.n;
            const m = ctx.measureText(txt);
            const lx = x + rd + 7, ly = y;
            const p = 3;
            ctx.fillStyle = 'rgba(10,12,28,0.78)';
            const bx = lx-p, by = ly-fs/2-p, bw = m.width+p*2, bh = fs+p*2, br = 4;
            ctx.beginPath();
            ctx.moveTo(bx+br, by); ctx.lineTo(bx+bw-br, by);
            ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+br);
            ctx.lineTo(bx+bw, by+bh-br);
            ctx.quadraticCurveTo(bx+bw, by+bh, bx+bw-br, by+bh);
            ctx.lineTo(bx+br, by+bh);
            ctx.quadraticCurveTo(bx, by+bh, bx, by+bh-br);
            ctx.lineTo(bx, by+br);
            ctx.quadraticCurveTo(bx, by, bx+br, by);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = (isH || isPin) ? '#FFFFFF' : 'rgba(255,255,255,0.75)';
            ctx.fillText(txt, lx, ly);
        });
    }

    function drawLine(pts, color) {
        ctx.beginPath();
        pts.forEach((p,i) => i ? ctx.lineTo(p[0],p[1]) : ctx.moveTo(p[0],p[1]));
        ctx.strokeStyle = color+'40'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
        ctx.beginPath();
        pts.forEach((p,i) => i ? ctx.lineTo(p[0],p[1]) : ctx.moveTo(p[0],p[1]));
        ctx.strokeStyle = color; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    }

    // ==========================================
    // SEARCH
    // ==========================================
    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    const searchClear = document.getElementById('searchClear');
    const searchIcon = document.getElementById('searchIcon');

    let searchResults = [];
    let selectedIdx = -1;

    function diacriticFold(s) {
        return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        const fi = diacriticFold(text), fq = diacriticFold(query);
        const idx = fi.indexOf(fq);
        if (idx === -1) return text;
        return text.slice(0,idx) + '<em>' + text.slice(idx, idx+query.length) + '</em>' + text.slice(idx+query.length);
    }

    function doSearch(q) {
        if (!q.trim()) { closeDropdown(); return; }
        const fq = diacriticFold(q.trim());
        searchResults = ALL_STATIONS.filter(s => diacriticFold(s.n).includes(fq));
        selectedIdx = searchResults.length > 0 ? 0 : -1;
        renderDropdown(q.trim());
    }

    function renderDropdown(q) {
        searchDropdown.innerHTML = '';
        if (searchResults.length === 0) {
            searchDropdown.innerHTML = '<div class="search-empty">No stations found</div>';
            searchDropdown.classList.add('open');
            return;
        }
        searchResults.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'search-result' + (i === selectedIdx ? ' selected' : '');
            div.dataset.idx = i;

            const dots = s.lines.map(ln =>
                '<span class="sr-dot" style="background:'+COLORS[ln]+'"></span>'
            ).join('');
            const linesLabel = s.lines.join(' · ');

            div.innerHTML =
                '<span class="sr-dots">' + dots + '</span>' +
                '<span class="sr-name">' + highlightMatch(s.n, q) + '</span>' +
                '<span class="sr-lines">' + linesLabel + '</span>';

            div.addEventListener('mousedown', e => {
                e.preventDefault();
                selectStation(i);
            });
            searchDropdown.appendChild(div);
        });
        searchDropdown.classList.add('open');
    }

    function selectStation(idx) {
        if (idx < 0 || idx >= searchResults.length) return;
        const s = searchResults[idx];
        pinnedStation = s;
        cLat = s.lat; cLng = s.lng;
        zoom = Math.min(ZMAX, Math.max(zoom, 15));
        pinPulse = 60;
        render();
        closeDropdown();
        searchInput.value = s.n;
        searchInput.blur();
    }

    function closeDropdown() {
        searchDropdown.classList.remove('open');
        searchDropdown.innerHTML = '';
        searchResults = [];
        selectedIdx = -1;
    }

    searchInput.addEventListener('input', e => {
        const v = e.target.value;
        searchClear.style.display = v ? 'block' : 'none';
        searchIcon.style.display = v ? 'none' : 'block';
        if (!v) { pinnedStation = null; render(); closeDropdown(); return; }
        doSearch(v);
    });

    searchInput.addEventListener('keydown', e => {
        if (!searchDropdown.classList.contains('open')) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIdx = Math.min(selectedIdx+1, searchResults.length-1);
            updateSelectedItem();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIdx = Math.max(selectedIdx-1, 0);
            updateSelectedItem();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (selectedIdx >= 0) selectStation(selectedIdx);
        } else if (e.key === 'Escape') {
            closeDropdown();
            searchInput.blur();
        }
    });

    function updateSelectedItem() {
        const items = searchDropdown.querySelectorAll('.search-result');
        items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
        items[selectedIdx]?.scrollIntoView({ block: 'nearest' });
    }

    searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.style.display = 'none';
        searchIcon.style.display = 'block';
        pinnedStation = null;
        closeDropdown();
        render();
        searchInput.focus();
    });

    // Close dropdown when clicking outside
    document.addEventListener('mousedown', e => {
        if (!document.getElementById('searchWrap').contains(e.target)) {
            closeDropdown();
        }
    });

    // ==========================================
    // INTERACTIONS
    // ==========================================
    window.addEventListener('resize', render);

    // Mouse drag
    wrap.addEventListener('mousedown', e => {
        dragging=true; dsx=e.clientX; dsy=e.clientY; dsLat=cLat; dsLng=cLng;
    });
    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const sc = (1<<Math.round(zoom))*TS;
        cLng = dsLng - (e.clientX-dsx)/sc*360;
        cLat = dsLat + (e.clientY-dsy)/sc*360*Math.cos(dsLat*Math.PI/180);
        render();
    });
    window.addEventListener('mouseup', () => { dragging=false; });

    // Touch
    let tsx,tsy,tsLat,tsLng;
    wrap.addEventListener('touchstart', e => {
        if (e.touches.length!==1) return;
        tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; tsLat=cLat; tsLng=cLng;
    },{passive:true});
    wrap.addEventListener('touchmove', e => {
        if (e.touches.length!==1) return;
        const sc = (1<<Math.round(zoom))*TS;
        cLng = tsLng - (e.touches[0].clientX-tsx)/sc*360;
        cLat = tsLat + (e.touches[0].clientY-tsy)/sc*360*Math.cos(tsLat*Math.PI/180);
        render();
    },{passive:true});

    // Wheel zoom
    wrap.addEventListener('wheel', e => {
        e.preventDefault();
        zoom = Math.max(ZMIN, Math.min(ZMAX, zoom + (e.deltaY>0?-.4:.4)));
        render();
    },{passive:false});

    window.zoomMap = function(d) {
        zoom = Math.max(ZMIN, Math.min(ZMAX, zoom+d*.6)); render();
    };

    // Hover
    function nearest(mx, my) {
        let best=null, bd=Infinity;
        for (const [ln, sts] of Object.entries(LINES)) {
            if (!vis[ln]) continue;
            for (const s of sts) {
                const [sx,sy] = geo2s(s.lat, s.lng);
                const d = Math.hypot(mx-sx,my-sy);
                if (d<20 && d<bd) { bd=d; best=s; }
            }
        }
        return best;
    }
    wrap.addEventListener('mousemove', e => {
        if (dragging) { ttEl.classList.remove('show'); return; }
        const r = wrap.getBoundingClientRect();
        const mx = e.clientX-r.left, my = e.clientY-r.top;
        const s = nearest(mx, my);
        if (s) {
            hovered = s;
            ttName.textContent = s.n;
            const lines = getLines(s.n);
            ttLines.innerHTML = lines.map(ln =>
                '<span class="tooltip-line" style="background:'+COLORS[ln]+'22;color:'+COLORS[ln]+';border:1px solid '+COLORS[ln]+'44">'+
                '<span class="tooltip-line-dot" style="background:'+COLORS[ln]+'"></span>'+ln+'</span>'
            ).join('');
            let tx = mx+16, ty = my-20;
            if (tx+170>W) tx=mx-170;
            if (ty<10) ty=my+20;
            ttEl.style.left=tx+'px'; ttEl.style.top=ty+'px';
            ttEl.classList.add('show');
            wrap.style.cursor='pointer';
        } else {
            if (hovered) { hovered=null; }
            ttEl.classList.remove('show');
            wrap.style.cursor='grab';
        }
        render();
    });
    wrap.addEventListener('mouseleave', () => {
        ttEl.classList.remove('show');
        if (hovered) { hovered=null; render(); }
    });

    // Toggle line
    window.toggleLine = function(name, el) {
        vis[name] = !vis[name];
        el.classList.toggle('off', !vis[name]);
        render();
    };

    // Fit all
    window.fitAll = function() {
        let a=90,b=-90,c=180,d=-180;
        for (const [ln,sts] of Object.entries(LINES)) {
            if (!vis[ln]) continue;
            for (const s of sts) { a=Math.min(a,s.lat); b=Math.max(b,s.lat); c=Math.min(c,s.lng); d=Math.max(d,s.lng); }
        }
        if (a>b) return;
        cLat=(a+b)/2; cLng=(c+d)/2;
        const zLat=Math.log2(360/(b-a)*H/TS)-1;
        const zLng=Math.log2(360/(d-c)*W/TS)-1;
        zoom = Math.max(ZMIN, Math.min(ZMAX, Math.min(zLat,zLng)-.3));
        render();
    };

    // Init
    setTimeout(fitAll, 80);
})();
</script>
</body>
</html>
